llm:
  provider: qwen
  model: Qwen3-30B-A3B-Instruct-2507
  temperature: 0.0
  max_tokens: 1024

embedding:
  provider: local
  # Repository-relative path created by the README preparation command.
  model: models/bge-base-zh-v1.5
  batch_size: 32

memory:
  provider: local_zep
  base_url: http://127.0.0.1:8000/api/v2
  database: outputs/qwen_locomo_memory.sqlite3
  top_k: 10

dataset:
  path: data/locomo10.json

output: outputs/qwen_locomo_predictions.json
debug_output: outputs/qwen_locomo_debug.json
